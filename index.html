Télécharger
</a>

<script>

/* =========================
   BOUTON ADMIN
========================= */

const accountArea =
document.getElementById("accountArea");

if(accountArea)
{
    if(localStorage.getItem("adminLogged") === "true")
    {
        accountArea.innerHTML = `
            <a href="dashboard.html" class="account-btn">
                Dashboard
            </a>

            <button class="logout-btn" onclick="logout()">
                Déconnexion
            </button>
        `;
    }
    else
    {
        accountArea.innerHTML = `
            <a href="admin.html" class="account-btn">
                Connexion
            </a>
        `;
    }
}

function logout()
{
    localStorage.removeItem("adminLogged");
    location.reload();
}

/* =========================
   POPUP
========================= */

function openPopup(title, desc, link)
{
    document.getElementById("popupTitle").innerText = title;
    document.getElementById("popupDesc").innerText = desc;
    document.getElementById("downloadBtn").href = link;

    document.getElementById("popup").style.display = "flex";
}

function closePopup()
{
    document.getElementById("popup").style.display = "none";
}

/* =========================
   JEUX AJOUTÉS PAR L'ADMIN
========================= */

const games =
JSON.parse(localStorage.getItem("games")) || [];

const grid =
document.querySelector(".games-grid");

games.forEach(game => {

    const card = document.createElement("div");
    card.className = "game-card";

    card.innerHTML = `
        <img src="${game.image}" alt="${game.name}">
        <span>${game.name}</span>
    `;

    card.onclick = () => {
        openPopup(
            game.name,
            "Téléchargement disponible",
            game.download
        );
    };

    grid.appendChild(card);
});

</script>
