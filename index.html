        <!-- POPUP -->
        <div id="popup">
            <div class="popup-content">
                <button class="close-btn" onclick="closePopup()">✖</button>
                <h2 id="popupTitle"></h2>
                <p id="popupDesc"></p>
                <a id="downloadBtn" href="#" target="_blank">
                    Télécharger
                </a>
            </div>
        </div>

        <script>
            /* =========================
               BOUTON ADMIN
            ========================= */
            const accountArea = document.getElementById("accountArea");

            if (accountArea) {
                if (localStorage.getItem("adminLogged") === "true") {
                    accountArea.innerHTML = `
                        <a href="dashboard.html" class="account-btn">
                            Dashboard
                        </a>
                        <button class="logout-btn" onclick="logout()">
                            Déconnexion
                        </button>
                    `;
                } else {
                    accountArea.innerHTML = `
                        <a href="admin.html" class="account-btn">
                            Connexion
                        </a>
                    `;
                }
            }

            function logout() {
                localStorage.removeItem("adminLogged");
                location.reload();
            }

            /* =========================
               POPUP
            ========================= */
            function openPopup(title, desc, link, message) {
                document.getElementById("popupTitle").innerText = title;
                document.getElementById("popupDesc").innerText = desc + "\n\n" + message;
                document.getElementById("downloadBtn").href = link;
                document.getElementById("popup").style.display = "flex";
            }

            function closePopup() {
                document.getElementById("popup").style.display = "none";
            }

            /* =========================
               JEUX AJOUTÉS PAR L'ADMIN
            ========================= */
            const games = JSON.parse(localStorage.getItem("games")) || [];
            const grid = document.querySelector(".games-grid");

            games.forEach(game => {
                const card = document.createElement("div");
                card.className = "game-card";
                card.innerHTML = `
                    <img src="${game.image}" alt="${game.name}">
                    <div class="game-mode">
                        <img src="${game.modeIcon}" alt="Mode">
                    </div>
                    <span>${game.name}</span>
                `;
                card.onclick = () => {
                    openPopup(
                        game.name,
                        "Téléchargement disponible",
                        game.download,
                        "??? Mettre votre message ???"
                    );
                };
                grid.appendChild(card);
            });
        </script>
