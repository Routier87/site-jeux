<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<script>
if(localStorage.getItem("adminLogged") !== "true"){
    window.location.href = "admin.html";
}
</script>

<div class="admin-panel">

<h1>Panel Admin</h1>

<input type="text" id="name" placeholder="Nom du jeu">
<input type="text" id="download" placeholder="Lien téléchargement">

<!-- IMAGE UPLOAD -->
<input type="file" id="imageFile" accept="image/*">

<button onclick="addGame()">Ajouter jeu</button>
<button onclick="logout()">Déconnexion</button>

<hr>

<h2>Jeux existants</h2>

<div id="list"></div>

</div>

<script>

function getGames(){
    return JSON.parse(localStorage.getItem("games")) || [];
}

function saveGames(games){
    localStorage.setItem("games", JSON.stringify(games));
    renderList();
}

function addGame(){

    const name = document.getElementById("name").value;
    const download = document.getElementById("download").value;
    const file = document.getElementById("imageFile").files[0];

    if(!name || !download || !file){
        alert("Remplis tout");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        let games = getGames();

        games.push({
            id: Date.now(),
            name: name,
            download: download,
            image: e.target.result
        });

        saveGames(games);

        alert("Jeu ajouté !");
    }

    reader.readAsDataURL(file);
}

function deleteGame(id){

    let games = getGames();

    games = games.filter(g => g.id !== id);

    saveGames(games);
}

function renderList(){

    const list = document.getElementById("list");
    const games = getGames();

    list.innerHTML = "";

    games.forEach(game => {

        list.innerHTML += `
        <div style="margin:10px;padding:10px;background:#222;border-radius:10px;">
            <strong>${game.name}</strong>
            <button onclick="deleteGame(${game.id})">Supprimer</button>
        </div>
        `;
    });
}

function logout(){
    localStorage.removeItem("adminLogged");
    window.location.href = "index.html";
}

renderList();

</script>

</body>
</html>
